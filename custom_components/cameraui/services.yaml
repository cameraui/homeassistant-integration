ptz:
  target:
    entity:
      - integration: cameraui
        domain: camera
  fields:
    action:
      required: true
      selector:
        select:
          options:
            - continuous
            - stop
            - move
            - absolute
            - preset
            - home
    pan:
      selector:
        number:
          min: -1
          max: 1
          step: 0.01
          mode: box
    tilt:
      selector:
        number:
          min: -1
          max: 1
          step: 0.01
          mode: box
    zoom:
      selector:
        number:
          min: -1
          max: 1
          step: 0.01
          mode: box
    preset:
      selector:
        text:
